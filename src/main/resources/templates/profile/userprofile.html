<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${user.username} + ' | Acebook'">User Profile</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

<main class="max-w-[600px] mx-auto px-4 py-8">

    <!-- Profile Header -->
    <div class="profile-header bg-white rounded shadow p-4 flex items-center space-x-4">
        <div>
            <!-- Username -->
            <h2 class="text-xl font-bold" th:text="${user.displayName}">DisplayName</h2>

            <p class="text-gray-600 mt-2" th:if="${user.bio}" th:text="${user.bio}"></p>

            <div class="text-neutral-600 text-md flex gap-3">
                <div>
        <span class="text-black font-bold text-lg"
              th:text="${followersCount}">0</span> Followers
                </div>
                <div>
        <span class="text-black font-bold text-lg"
              th:text="${followingCount}">0</span> Following
                </div>
            </div>
            <div th:if="${!isCurrentUser}">

                <form th:if="${!isFollowing}"
                      th:action="@{/users/{id}/follow(id=${user.id})}"
                      method="post">
                    <button class="bg-blue-500 text-white px-4 py-2 rounded">
                        Follow
                    </button>
                </form>

                <form th:if="${isFollowing}"
                      th:action="@{/users/{id}/unfollow(id=${user.id})}"
                      method="post">
                    <button class="bg-gray-400 text-white px-4 py-2 rounded">
                        Unfollow
                    </button>
                </form>

            </div>
            <!-- Edit / View Button -->
            <div class="mt-2">
                <a th:if="${isCurrentUser}"
                   th:href="@{/users/{id}/edit(id=${user.id})}"
                   class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded">
                    Edit Profile
                </a>
            </div>
        </div>
    </div>

    <!-- Posts Section -->
    <div class="posts mt-6">
        <div th:each="post : ${posts}" class="post-card bg-white rounded shadow p-4 mb-4">
            <p th:text="${post.content}">Post content</p>
        </div>

        <!-- If no posts -->
        <div th:if="${#lists.isEmpty(posts)}" class="text-center text-gray-500 py-12">
            No posts yet
        </div>
    </div>

</main>
</body>
</html>

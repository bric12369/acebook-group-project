<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Profile | Acebook</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-neutral-100 min-h-screen flex flex-col">

<!-- Navbar -->
<th:block th:insert="fragments/navbar.html"></th:block>

<main class="max-w-[600px] mx-auto px-5 py-10 flex-grow">

  <div class="bg-neutral-50 rounded-md shadow-md p-8 flex flex-col gap-6">

    <!-- Page Header -->
    <h1 class="text-2xl font-bold text-gray-800">Edit Profile</h1>

    <!-- Form -->
    <form th:action="@{/users/{id}/edit(id=${user.id})}" method="post" class="flex flex-col gap-5">

      <!-- Display Name -->
      <div class="flex flex-col gap-1">
        <label class="text-gray-700 font-medium">Display Name</label>
        <input type="text"
               name="displayName"
               th:value="${user.displayName}"
               class="w-full border border-neutral-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <!-- Bio -->
      <div class="flex flex-col gap-1">
        <label class="text-gray-700 font-medium">Bio</label>
        <textarea name="bio"
                  rows="4"
                  th:text="${user.bio}"
                  class="w-full border border-neutral-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"></textarea>
      </div>

      <!-- Buttons -->
      <div class="flex gap-3 pt-4">
        <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md shadow-sm duration-300">
          Save Changes
        </button>

        <a th:href="@{/posts}"
           class="bg-neutral-300 hover:bg-neutral-400 text-gray-800 px-4 py-2 rounded-md shadow-sm duration-300">
          Cancel
        </a>
      </div>

    </form>

  </div>

</main>

</body>
</html>

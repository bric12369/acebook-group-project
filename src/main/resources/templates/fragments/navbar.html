<nav class="border-b border-neutral-300 sticky top-0 px-5 py-3 bg-neutral-50 text-black flex justify-between items-center">

  <a href="/" class="text-blue-600 text-2xl hover:bg-neutral-200 duration-300 rounded-md px-3 py-2">
    <h2>Acebook</h2>
  </a>

  <div class="flex gap-5 items-center">

    <!-- Search -->
    <div class="relative">
      <input type="text"
             id="userSearchInput"
             placeholder="Search users..."
             class="border border-neutral-300 rounded-md px-3 py-2 w-48 focus:outline-none focus:ring-2 focus:ring-blue-400"
             autocomplete="off" />

      <div id="searchResults" class="hidden absolute right-0 mt-2 w-48 bg-white shadow-lg rounded border z-50 max-h-60 overflow-y-auto">
        <!-- JS will populate results here -->
      </div>
    </div>

    <!-- Profile Link -->
    <a th:href="@{/users/{id}(id=${currentUserId})}"
       class="flex gap-2 rounded-md px-3 py-2 hover:bg-neutral-200 duration-300 items-center">
      <i class="fa-regular fa-user"></i>
      <span>Profile</span>
    </a>

    <!-- Notifications -->
    <div class="relative">
      <button onclick="toggleNotifications()"
              class="relative text-xl px-3 py-2 hover:bg-neutral-200 rounded">
        🔔
        <!-- Badge -->
        <span id="notificationBadge"
              class="absolute -top-1 -right-1 bg-red-500 text-white text-xs px-2 rounded-full">
          0
        </span>
      </button>

      <div id="notificationDropdown" class="hidden absolute right-0 mt-2 w-72 bg-white shadow-lg rounded border z-50">
        <div class="p-3 border-b font-semibold">Notifications</div>
        <div th:if="${#lists.isEmpty(notifications)}" class="p-3 text-gray-500">
          No notifications
        </div>
        <div th:each="notification : ${notifications}" class="notification-item hidden p-3 border-b hover:bg-gray-100">
          <p th:text="${notification.content}">Notification message</p>
          <span class="text-xs text-gray-400" th:text="${#temporals.format(notification.createdAt, 'HH:mm')}"></span>
        </div>
      </div>
    </div>

    <!-- Logout -->
    <a th:href="@{/logout}"
       class="flex rounded-md px-3 py-2 border border-neutral-200 hover:bg-neutral-200 duration-300 items-center">
      Logout
    </a>

  </div>
</nav>

<script>
  // ----- Notifications -----
  const allNotifications = Array.from(document.querySelectorAll('.notification-item'));
  const badge = document.getElementById('notificationBadge');
  allNotifications.forEach(item => item.classList.remove('hidden'));
  badge.textContent = allNotifications.length;

  function toggleNotifications() {
    const dropdown = document.getElementById("notificationDropdown");
    const isHidden = dropdown.classList.contains("hidden");
    dropdown.classList.toggle("hidden");

    if (isHidden) badge.classList.add('hidden');
  }

  document.addEventListener("click", function(event) {
    const dropdown = document.getElementById("notificationDropdown");
    const button = event.target.closest("button");
    if (!button && !dropdown.contains(event.target)) {
      dropdown.classList.add("hidden");
    }
  });

  //User Search
  const searchInput = document.getElementById('userSearchInput');
  const searchResults = document.getElementById('searchResults');

  let searchTimeout;

  searchInput.addEventListener('input', function() {
    const query = this.value.trim();

    clearTimeout(searchTimeout);

    if (query.length === 0) {
      searchResults.classList.add('hidden');
      searchResults.innerHTML = '';
      return;
    }

    searchTimeout = setTimeout(() => {
      fetch(`/users/search?q=${encodeURIComponent(query)}`)
              .then(res => res.json())
              .then(users => {
                searchResults.innerHTML = '';

                if (users.length === 0) {
                  searchResults.innerHTML = '<div class="p-2 text-gray-500">No users found</div>';
                } else {
                  users.forEach(user => {
                    const div = document.createElement('div');
                    div.className = 'px-3 py-2 hover:bg-gray-200 cursor-pointer';
                    div.textContent = user.username;
                    div.addEventListener('click', () => {
                      window.location.href = `/users/${user.id}`;
                    });
                    searchResults.appendChild(div);
                  });
                }

                searchResults.classList.remove('hidden');
              });
    }, 300);
  });
  document.addEventListener('click', function(event) {
    if (!searchInput.contains(event.target) && !searchResults.contains(event.target)) {
      searchResults.classList.add('hidden');
    }
  });
</script>

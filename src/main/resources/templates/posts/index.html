<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
          xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
    <head lang="en">
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Acebook</title>
        <link rel="stylesheet" href="/main.css" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>
    <body>

    <body class="min-h-screen flex flex-col bg-neutral-100">

        <!-- Navbar -->
        <th:block th:insert="fragments/navbar.html"></th:block>

        <!-- Main page content -->
        <main class="bg-neutral-100 h-full flex justify-center pt-10 px-5">

            <!-- Wrapper div for responsive sizing -->
            <div class="xl:w-225 lg:w-175 md:w-125 w-full flex flex-col gap-5">

    <ul>
        <li th:each="post : ${posts}">
            <a th:href="'/posts/' + ${post.getId()}"><span th:text="${post.content}"></span></a>
            <a th:href="@{/users/{id}(id=${post.user.id})}"
               class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded">
                View Profile
            </a>

            <form th:action="@{/comments}" method="post">
                <input type="hidden" name="postId" th:value="${post.id}" />

                <input type="submit" value="Like" />

                <p>
                    Comment:
                    <input type="text" name="content" />
                    <input type="submit" value="Add Comment"/>
                </p>
            </form>
        </li>
    </ul>
                <!-- Current user -->
                <div class="bg-neutral-50 rounded-md px-15 py-10 shadow-md flex flex-col md:flex-row items-center gap-5 px-5">
                    <!-- Profile image -->
                    <div class="w-25 h-25 bg-red-300 rounded-full">
                        <img src="https://i.pinimg.com/736x/d2/3e/f6/d23ef673fc4ec07e8e9c565071e2f2af.jpg" alt="Profile image" class="rounded-full"/>
                    </div>

                    <!-- Details -->
                    <div class="flex flex-col gap-3">
                        <h2 class="text-2xl">Current User</h2>

                        <!-- Follower counts -->
                        <div class="text-neutral-600 text-md flex gap-3">
                            <div>
                                <span id="followers" class="text-black font-bold text-lg">X</span> Followers
                            </div>
                            <div>
                                <span id="following" class="text-black font-bold text-lg">Y</span> Following
                            </div>

                        </div>

                        <a class="border border-neutral-200 rounded-md hover:bg-neutral-200 duration-300 w-fit px-3 py-2">Edit Profile</a>
                    </div>
                </div>

                <!-- New post form -->
                <form action="#" th:action="@{/posts}" th:object="${post}" method="post" class="bg-neutral-50 rounded-md px-5 py-5 shadow-md">
                    <!-- Content textarea -->
                    <textarea th:field="*{content}" placeholder="What's on your mind?" class="bg-neutral-200 rounded-md w-full min-h-30 resize-none px-3 py-2"></textarea>

                    <!-- Button controls -->
                    <div class="flex justify-between mt-2">
                        <!-- Left side controls -->
                        <div class="flex gap-3">
                            <button type="reset" value="Reset" class="cursor-pointer px-3 py-2 bg-red-300 text-neutral-50 rounded-md hover:bg-red-500 duration-300"><i class="fa fa-trash"></i></button>
                            <button class="cursor-pointer border border-neutral-200 px-3 py-2 bg-neutral-50 rounded-md hover:bg-neutral-200 duration-300"><i class="fa fa-paperclip"></i></button>
                        </div>
                        <!-- Post button -->
                        <button type="submit" value="Post" class="cursor-pointer px-3 py-2 bg-neutral-500 text-neutral-50 rounded-md hover:bg-neutral-400 duration-300">Post</button>
                    </div>
                </form>

                <!-- Post feed -->
                <div th:each="post: ${posts}" >
                    <th:block th:insert="fragments/post.html"></th:block>
                </div>
            </div>
            <!-- Like + Comment Controls -->
            <div class="flex items-center gap-5">

                <!-- Like button -->
                <form th:action="@{/posts/{id}/like(id=${post.id})}" method="post">
                    <button type="submit"
                            class="flex items-center gap-2 text-red-500 hover:text-red-400 cursor-pointer">
                        <i class="fa-regular fa-heart"></i>
                        Like
                    </button>
                </form>

                <!-- Like count -->
                <span class="text-neutral-600 text-sm">
            <span th:text="${likeCounts.get(post.id)}">0</span> likes
        </span>

            </div>
        </main>
    </body>
</html>

<!DOCTYPE html>
    <html xmlns:th="http://www.thymeleaf.org"
          xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5" >
    <head lang="en">
        <meta charset="UTF-8"/>
        <title>Acebook</title>
        <link rel="stylesheet" href="/main.css" />
    </head>
    <body>

    <h1>Posts</h1>

    <div sec:authorize="isAuthenticated()" id="greeting">
        Signed in as <span sec:authentication="principal.attributes['email']"></span>
    </div>

    <form action="#" th:action="@{/posts}" th:object="${post}" method="post">
        <p>Content: <input type="text" th:field="*{content}" /></p>
        <p><input type="submit" value="Submit" /> <input type="reset" value="Reset" /></p>
    </form>

<!--    <ul th:each="post: ${posts}">-->
<!--        <li th:text="${post.content}" />-->
<!--        <form th:action="@{/comments}" th:object="${comment}" method="post">-->
<!--            <p> Comment: <input type="text", th:field="*{content}" /></p>-->
<!--        </form>-->
<!--    </ul>-->

    <ul>
        <li th:each="post : ${posts}">
            <span th:text="${post.content}"></span>

            <form th:action="@{/comments}" method="post">
                <input type="hidden" name="postId" th:value="${post.id}" />

                <p>
                    Comment:
                    <input type="text" name="content" />
                    <input type="submit" value="Add Comment"/>
                </p>
            </form>
        </li>
    </ul>

    </body>
</html>

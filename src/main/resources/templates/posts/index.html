<!DOCTYPE html>
    <html xmlns:th="http://www.thymeleaf.org"
          xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5" >
    <head lang="en">
        <meta charset="UTF-8"/>
        <title>Acebook</title>
        <link rel="stylesheet" href="/main.css" />
    </head>
    <body>

    <h1>Posts</h1>

    <div sec:authorize="isAuthenticated()" class="mb-6 flex items-center space-x-4">
        <span>Signed in as <span sec:authentication="principal.attributes['email']"></span></span>

        <a th:href="@{/users/{id}(id=${currentUserId})}"
           class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded">
            My Profile
        </a>
    </div>

    <form action="#" th:action="@{/posts}" th:object="${post}" method="post">
        <p>Content: <input type="text" th:field="*{content}" /></p>
        <p><input type="submit" value="Submit" /> <input type="reset" value="Reset" /></p>
    </form>

    <ul>
        <li th:each="post : ${posts}">
            <a th:href="'/posts/' + ${post.getId()}"><span th:text="${post.content}"></span></a>
            <a th:href="@{/users/{id}(id=${post.user.id})}"
               class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded">
                View Profile
            </a>

            <form th:action="@{/comments}" method="post">
                <input type="hidden" name="postId" th:value="${post.id}" />

                <p>
                    Comment:
                    <input type="text" name="content" />
                    <input type="submit" value="Add Comment"/>
                </p>
            </form>
        </li>
    </ul>

    </body>
</html>

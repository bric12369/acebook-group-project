<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
          xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
    <head lang="en">
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Acebook</title>
        <link rel="stylesheet" href="/main.css" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <script src="/like_post.js"></script>
    </head>

    <body class="min-h-screen flex flex-col bg-neutral-100 pb-5">

        <!-- Navbar -->
        <th:block th:insert="fragments/navbar.html"></th:block>

        <!-- Main page content -->
        <main class="bg-neutral-100 h-full flex justify-center pt-10 px-5">

            <!-- Wrapper div for responsive sizing -->
            <div class="xl:w-225 lg:w-175 md:w-125 w-full flex flex-col gap-5">

                <!-- Current user -->
                <th:block th:insert="fragments/profile.html"></th:block>

                <!-- New post form -->
                <form action="#" th:action="@{/posts}" th:object="${post}" method="post" class="bg-neutral-50 rounded-md px-5 py-5 shadow-md">
                    <!-- Content textarea -->
                    <textarea th:field="*{content}" placeholder="What's on your mind?" class="bg-neutral-200 rounded-md w-full min-h-30 resize-none px-3 py-2"></textarea>

                    <!-- Button controls -->
                    <div class="flex justify-between mt-2">
                        <!-- Left side controls -->
                        <div class="flex gap-3">
                            <button type="reset" value="Reset" class="cursor-pointer px-3 py-2 bg-red-300 text-neutral-50 rounded-md hover:bg-red-500 duration-300"><i class="fa fa-trash"></i></button>
                            <button class="cursor-pointer border border-neutral-200 px-3 py-2 bg-neutral-50 rounded-md hover:bg-neutral-200 duration-300"><i class="fa fa-paperclip"></i></button>
                        </div>
                        <!-- Post button -->
                        <button type="submit" value="Post" class="cursor-pointer px-3 py-2 bg-neutral-500 text-neutral-50 rounded-md hover:bg-neutral-400 duration-300">Post</button>
                    </div>
                </form>

                <!-- Post feed -->
                <div th:each="post: ${posts}" >
                    <th:block th:insert="fragments/post.html :: postFragment(${post}, '/posts')"></th:block>
                </div>
            </div>
        </main>
    </body>
</html>

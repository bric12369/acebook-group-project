<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5" >
<head lang="en">
    <meta charset="UTF-8">
    <title>Post</title>
</head>
<body>
    <h3 th:text="${post.content}"></h3>
        <ul th:each="comment : ${comments}">
            <li>
                <span th:text="${comment.getContent()}"></span><br>
                <span th:text="'User: ' + ${comment.getUser().getUsername()}"></span>
            </li>
        </ul>
</body>
</html>
